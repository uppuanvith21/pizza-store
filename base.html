<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pizza{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --fire: #FF4500;
            --ember: #FF8C00;
            --gold: #FFD700;
            --coal: #1a1008;
            --ash: #2d2015;
            --smoke: #3d3020;
            --cream: #FFF8EE;
            --warm-white: #FFFAF3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--coal);
            color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(255,69,0,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255,140,0,0.06) 0%, transparent 40%);
        }

        /* NAV */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 4rem;
            border-bottom: 1px solid rgba(255,140,0,0.15);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(26,16,8,0.85);
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--gold);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .nav-logo span { color: var(--fire); }

        .nav-links { display: flex; gap: 2.5rem; list-style: none; }

        .nav-links a {
            color: rgba(255,248,238,0.7);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: var(--gold); }

        .btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-fire {
            background: linear-gradient(135deg, var(--fire), var(--ember));
            color: white;
            box-shadow: 0 4px 20px rgba(255,69,0,0.4);
        }

        .btn-fire:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255,69,0,0.6);
        }

        .btn-outline {
            background: transparent;
            color: var(--gold);
            border: 1px solid rgba(255,215,0,0.4);
        }

        .btn-outline:hover {
            background: rgba(255,215,0,0.1);
            border-color: var(--gold);
        }

        footer {
            text-align: center;
            padding: 3rem;
            border-top: 1px solid rgba(255,140,0,0.15);
            color: rgba(255,248,238,0.3);
            font-size: 0.85rem;
            margin-top: 6rem;
        }

        footer span { color: var(--fire); }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">Inferno<span>🔥</span>Pizza</a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/menu">Menu</a></li>
            <li><a href="/order">Order Now</a></li>
        </ul>
    </nav>

    {% block content %}{% endblock %}

    <footer>
        <p>© 2025 Inferno Pizza — Crafted with <span>🔥</span> & Passion</p>
    </footer>
</body>
</html>
